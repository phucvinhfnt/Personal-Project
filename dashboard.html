<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8"/>
<title>NT Crime Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.navbar{
background:#1f3b73;
color:white;
padding:14px 20px;
font-weight:bold;
display:flex;
justify-content:space-between;
}

.wrap{
display:flex;
height:70vh;
}

.sidebar{
width:320px;
background:#1f3b73;
color:white;
padding:15px;
overflow:auto;
}

.control{
margin-bottom:12px;
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:8px;
}

select{
width:100%;
padding:8px;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:10px;
background:#2e5aac;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:8px;
}

#map{
flex:1;
}

.dashboard{
height:30vh;
background:white;
display:flex;
gap:12px;
padding:12px;
border-top:1px solid #ddd;
}

.card{
flex:1;
border:1px solid #ddd;
border-radius:10px;
padding:10px;
}

.card h4{
margin:0 0 6px;
}

.kpi{
font-size:28px;
font-weight:bold;
}

canvas{
height:100%!important;
}

</style>
</head>

<body>

<div class="navbar">
<div>NT Crime Dashboard</div>
<div id="asAt">Loading...</div>
</div>

<div class="wrap">

<div class="sidebar">

<h3>Filters</h3>

<div class="control">
<label>Location</label>
<select id="locationSelect">
<option value="all">All NT</option>
<option value="darwin">Darwin</option>
<option value="palmerston">Palmerston</option>
<option value="alice">Alice Springs</option>
</select>
</div>

<div class="control">
<label>Offence Type</label>
<select id="offenceSelect">
<option value="all">All offences</option>
</select>
</div>

<div class="control">
<label>Start Month</label>
<select id="startMonth"></select>

<label>End Month</label>
<select id="endMonth"></select>
</div>

<button onclick="applyFilters()">Apply Filters</button>
<button onclick="togglePolice()">Toggle Police Stations</button>

</div>

<div id="map"></div>

</div>

<div class="dashboard">

<div class="card">
<h4>Total Offences</h4>
<div class="kpi" id="totalValue">0</div>
<div id="totalChange"></div>

<hr>

<h4>Alcohol Offences</h4>
<div class="kpi" id="alcValue">0</div>
<div id="alcChange"></div>
</div>

<div class="card">
<h4>Monthly Trend</h4>
<canvas id="trendChart"></canvas>
</div>

<div class="card">
<h4>Offence Types</h4>
<canvas id="donutChart"></canvas>
</div>

</div>

<script>

let map
let policeLayer
let crimeData=[]

let trendChart
let donutChart

async function initDashboard(){

const response = await fetch("nt_crime_statistics_dec_2025_FACT_OFFENCES.csv")

const text = await response.text()

const parsed = Papa.parse(text,{
header:true,
dynamicTyping:true
})

crimeData = parsed.data.filter(r=>r.year_month)

initFilters()

initMap()

applyFilters()

}

function initFilters(){

const offenceSelect=document.getElementById("offenceSelect")

const offences=[...new Set(crimeData.map(r=>r.offence_type))]

offences.forEach(o=>{
if(!o)return
const opt=document.createElement("option")
opt.value=o
opt.textContent=o
offenceSelect.appendChild(opt)
})

const months=[...new Set(crimeData.map(r=>r.year_month))].sort()

const start=document.getElementById("startMonth")
const end=document.getElementById("endMonth")

months.forEach(m=>{

let o1=document.createElement("option")
o1.value=m
o1.textContent=m
start.appendChild(o1)

let o2=document.createElement("option")
o2.value=m
o2.textContent=m
end.appendChild(o2)

})

start.value=months[0]
end.value=months[months.length-1]

document.getElementById("asAt").innerText="Latest data: "+months[months.length-1]

}

function initMap(){

map=L.map("map").setView([-19,133],6)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OpenStreetMap"}
).addTo(map)

policeLayer=L.layerGroup()

const policeStations=[
{name:"Darwin Police",lat:-12.4634,lon:130.8456},
{name:"Palmerston Police",lat:-12.4860,lon:130.9833},
{name:"Alice Springs Police",lat:-23.6980,lon:133.8807}
]

policeStations.forEach(p=>{
L.marker([p.lat,p.lon])
.bindPopup(p.name)
.addTo(policeLayer)
})

policeLayer.addTo(map)

}

function togglePolice(){

if(map.hasLayer(policeLayer)){
map.removeLayer(policeLayer)
}else{
map.addLayer(policeLayer)
}

}

function applyFilters(){

const region=document.getElementById("locationSelect").value
const offence=document.getElementById("offenceSelect").value
const start=document.getElementById("startMonth").value
const end=document.getElementById("endMonth").value

let filtered=crimeData

filtered=filtered.filter(r=>r.year_month>=start && r.year_month<=end)

if(region!=="all"){
filtered=filtered.filter(r=>r.reporting_region.toLowerCase().includes(region))
}

if(offence!=="all"){
filtered=filtered.filter(r=>r.offence_type===offence)
}

updateKPI(start,end)

updateTrend(filtered)

updateDonut(filtered)

}

function sumMonth(month,alcohol=false){

let rows=crimeData.filter(r=>r.year_month===month)

if(alcohol){
rows=rows.filter(r=>Number(r.alcohol_flag)===1)
}

return rows.reduce((s,r)=>s+Number(r.offence_count||0),0)

}

function updateKPI(start,end){

let startTotal=sumMonth(start)
let endTotal=sumMonth(end)

let startAlc=sumMonth(start,true)
let endAlc=sumMonth(end,true)

document.getElementById("totalValue").innerText=endTotal

let pct=((endTotal-startTotal)/startTotal)*100
document.getElementById("totalChange").innerText=pct.toFixed(2)+"%"

document.getElementById("alcValue").innerText=endAlc

let pct2=((endAlc-startAlc)/startAlc)*100
document.getElementById("alcChange").innerText=pct2.toFixed(2)+"%"

}

function updateTrend(data){

const monthly={}

data.forEach(r=>{
monthly[r.year_month]=(monthly[r.year_month]||0)+Number(r.offence_count)
})

const labels=Object.keys(monthly).sort()
const values=labels.map(m=>monthly[m])

if(trendChart) trendChart.destroy()

trendChart=new Chart(document.getElementById("trendChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Offences",
data:values,
borderColor:"#1f77b4"
}]
},
options:{responsive:true}
})

}

function updateDonut(data){

const bucket={}

data.forEach(r=>{
bucket[r.offence_type]=(bucket[r.offence_type]||0)+Number(r.offence_count)
})

const sorted=Object.entries(bucket)
.sort((a,b)=>b[1]-a[1])
.slice(0,8)

const labels=sorted.map(x=>x[0])
const values=sorted.map(x=>x[1])

if(donutChart) donutChart.destroy()

donutChart=new Chart(document.getElementById("donutChart"),{
type:"doughnut",
data:{
labels:labels,
datasets:[{data:values}]
}
})

}

window.addEventListener("load",initDashboard)

</script>

</body>
</html>
