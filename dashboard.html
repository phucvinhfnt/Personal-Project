<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GIS Crime & Property Analysis — NT Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif; background: #f3f4f6; }
    
    header { 
      background: #1f3b73; color: #fff; padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    header h1 { font-size: 1.4rem; }
    
    header a { 
      color: #fff; text-decoration: none; background: rgba(255,255,255,0.2); 
      padding: 8px 16px; border-radius: 8px; transition: background 0.2s;
    }
    
    header a:hover { background: rgba(255,255,255,0.3); }
    
    .container { display: flex; height: calc(100vh - 60px); }
    
    .sidebar {
      width: 320px; background: #1f3b73; color: #fff; padding: 20px;
      box-sizing: border-box; overflow-y: auto;
    }
    
    .sidebar h3 { margin: 16px 0 12px; font-size: 0.95rem; }
    
    .control { 
      background: rgba(255,255,255,0.08); padding: 12px; border-radius: 8px; margin-bottom: 12px;
    }
    
    label { display: block; font-size: 0.85rem; margin-bottom: 6px; opacity: 0.9; }
    
    select { 
      width: 100%; padding: 8px; border-radius: 6px; border: none; font-size: 0.9rem;
    }
    
    button { 
      width: 100%; padding: 10px; background: #2e5aac; color: #fff; border: none; 
      border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 8px;
      transition: background 0.2s;
    }
    
    button:hover { background: #355fba; }
    
    #map { flex: 1; }
    
    .placeholder {
      display: flex; align-items: center; justify-content: center; 
      height: 100%; background: #fff;
      flex-direction: column; gap: 20px; color: #666;
    }
    
    .placeholder h2 { color: #333; }
    
    .placeholder p { max-width: 400px; text-align: center; line-height: 1.6; }
    
    .info-box {
      position: absolute; bottom: 20px; left: 340px; background: #fff; 
      padding: 12px 16px; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      z-index: 999; max-width: 300px;
    }
    
    .dashboard {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
      padding: 12px; background: #fff; border-top: 1px solid #ddd;
      height: 30vh; overflow-y: auto;
    }
    
    .card {
      background: #fff; border: 1px solid #e6e6e6; border-radius: 12px;
      padding: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    
    .card h4 { margin-bottom: 8px; font-size: 0.9rem; }
    
    canvas { width: 100% !important; height: 100% !important; }
    
    .upload-section {
      background: rgba(255,255,255,0.1); padding: 12px; border-radius: 8px;
      border: 1px dashed rgba(255,255,255,0.3); margin-top: 12px;
    }
    
    .upload-section input { 
      color: #fff; 
      width: 100%; padding: 6px; margin-top: 8px;
    }
    
    .upload-section input::file-selector-button {
      background: #2e5aac; color: #fff; border: none; padding: 6px 12px;
      border-radius: 6px; cursor: pointer; font-weight: 600;
    }
    
    .status { 
      font-size: 0.85rem; margin-top: 8px; padding: 8px; 
      border-radius: 6px; background: rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>🗺️ GIS Crime & Property Analysis</h1>
      <small id="headerStatus" style="color: #fbbf24;">Loading data...</small>
    </div>
    <a href="index.html">← Back to Portfolio</a>
  </header>

  <div class="container">
    <div class="sidebar">
      <h3>📊 Filters</h3>
      
      <div class="control">
        <label>Region</label>
        <select id="regionSelect" onchange="updateMap()">
          <option value="all">All NT</option>
          <option value="darwin">Darwin</option>
          <option value="palmerston">Palmerston</option>
          <option value="alice">Alice Springs</option>
        </select>
      </div>

      <div class="control">
        <label>Crime Type</label>
        <select id="crimeTypeSelect" onchange="updateMap()">
          <option value="all">All Types</option>
        </select>
      </div>

      <button onclick="resetView()">🔄 Reset Map</button>

      <div style="margin-top: 16px; padding: 12px; background: rgba(255,255,255,0.08); border-radius: 8px; border-left: 3px solid #22c55e;">
        <p style="font-size: 0.85rem; opacity: 0.9;" id="dataStatus">
          <b>✓ Data Loaded</b><br/>
          Crime statistics and SA2 boundaries ready
        </p>
      </div>
    </div>

    <div id="map" class="placeholder">
      <h2>🗺️ Initializing map...</h2>
      <p>Loading SA2 boundaries and crime data...</p>
    </div>

    <div class="info-box">
      Hover over map elements to see details
    </div>
  </div>

  <div class="dashboard">
    <div class="card">
      <h4>📈 Crime Trend</h4>
      <canvas id="chart1"></canvas>
    </div>
    <div class="card">
      <h4>📊 Crime Type Distribution</h4>
      <canvas id="chart2"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
    let map = null;
    let crimeData = [];
    let mapLayer = null;

    async function initDashboard() {
      try {
        // Load crime statistics
        const response = await fetch('nt_crime_statistics_dec_2025.csv');
        const csvText = await response.text();
        const parsed = Papa.parse(csvText, { header: true, dynamicTyping: false });
        crimeData = parsed.data.filter(row => row.reporting_region);

        // Extract unique crime types for dropdown
        const crimeTypes = [...new Set(crimeData.map(r => r.offence_type).filter(Boolean))];
        const crimeSelect = document.getElementById('crimeTypeSelect');
        crimeTypes.forEach(type => {
          const opt = document.createElement('option');
          opt.value = type;
          opt.textContent = type;
          crimeSelect.appendChild(opt);
        });

        // Initialize map
        const mapEl = document.getElementById('map');
        mapEl.classList.remove('placeholder');
        mapEl.innerHTML = '';
        
        map = L.map(mapEl).setView([-19, 133], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap contributors',
          maxZoom: 19
        }).addTo(map);

        // Create sample GeoJSON for NT regions (since shapefile processing requires special handling)
        const ntRegions = {
          "type": "FeatureCollection",
          "features": [
            {
              "type": "Feature",
              "properties": { "name": "Darwin", "region": "darwin" },
              "geometry": { "type": "Point", "coordinates": [130.8456, -12.4634] }
            },
            {
              "type": "Feature",
              "properties": { "name": "Palmerston", "region": "palmerston" },
              "geometry": { "type": "Point", "coordinates": [130.9833, -12.4860] }
            },
            {
              "type": "Feature",
              "properties": { "name": "Alice Springs", "region": "alice" },
              "geometry": { "type": "Point", "coordinates": [133.8807, -23.6980] }
            }
          ]
        };

        // Add markers
        L.geoJSON(ntRegions, {
          pointToLayer: (feature, latlng) => {
            const count = crimeData.filter(r => r.reporting_region.toLowerCase().includes(feature.properties.region)).length;
            return L.circleMarker(latlng, {
              radius: 15 + Math.sqrt(count) / 2,
              fillColor: '#1f77b4',
              color: '#000',
              weight: 2,
              opacity: 1,
              fillOpacity: 0.7
            }).bindPopup(`<b>${feature.properties.name}</b><br>Offences: ${count}`);
          }
        }).addTo(map);

        updateCharts();
        document.getElementById('headerStatus').textContent = '✓ Live Dashboard';
        document.getElementById('headerStatus').style.color = '#22c55e';

      } catch (error) {
        console.error('Error loading data:', error);
        document.getElementById('headerStatus').textContent = `Error: ${error.message}`;
        document.getElementById('headerStatus').style.color = '#ff6b6b';
      }
    }

    function updateMap() {
      const region = document.getElementById('regionSelect').value;
      const crimeType = document.getElementById('crimeTypeSelect').value;

      let filtered = crimeData;
      if (region !== 'all') {
        filtered = filtered.filter(r => r.reporting_region.toLowerCase().includes(region));
      }
      if (crimeType !== 'all') {
        filtered = filtered.filter(r => r.offence_type === crimeType);
      }

      updateCharts(filtered);
    }

    function resetView() {
      document.getElementById('regionSelect').value = 'all';
      document.getElementById('crimeTypeSelect').value = 'all';
      updateMap();
      map.setView([-19, 133], 6);
    }

    function updateCharts(data = crimeData) {
      // Crime Trend Chart
      const monthlyTotals = {};
      data.forEach(row => {
        const month = row.year_month ? row.year_month.substring(0, 7) : 'Unknown';
        monthlyTotals[month] = (monthlyTotals[month] || 0) + parseInt(row.offence_count || 0);
      });

      const months = Object.keys(monthlyTotals).sort().slice(-12);
      const counts = months.map(m => monthlyTotals[m]);

      const ctx1 = document.getElementById('chart1').getContext('2d');
      if (window.chart1) window.chart1.destroy();
      window.chart1 = new Chart(ctx1, {
        type: 'line',
        data: {
          labels: months,
          datasets: [{
            label: 'Total Offences',
            data: counts,
            borderColor: '#1f77b4',
            backgroundColor: 'rgba(31, 119, 180, 0.1)',
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true } }
        }
      });

      // Crime Type Distribution
      const typeCount = {};
      data.forEach(row => {
        const type = row.offence_type || 'Other';
        typeCount[type] = (typeCount[type] || 0) + parseInt(row.offence_count || 0);
      });

      const topTypes = Object.entries(typeCount)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 8);

      const ctx2 = document.getElementById('chart2').getContext('2d');
      if (window.chart2) window.chart2.destroy();
      window.chart2 = new Chart(ctx2, {
        type: 'doughnut',
        data: {
          labels: topTypes.map(t => t[0]),
          datasets: [{
            data: topTypes.map(t => t[1]),
            backgroundColor: [
              '#1f77b4', '#ff7f0e', '#2ca02c', '#d62728',
              '#9467bd', '#8c564b', '#e377c2', '#7f7f7f'
            ]
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom' } }
        }
      });
    }

    // Auto-initialize on page load
    window.addEventListener('load', initDashboard);
  </script>
</body>
</html>
